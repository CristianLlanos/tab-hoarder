    <rect x="188" y="730" width="648" height="56" rx="16" fill="rgba(0,122,255,0.12)" stroke="rgba(0,122,255,0.2)" stroke-width="1.5"/>
    <rect x="220" y="750" width="160" height="10" rx="5" fill="rgba(0,122,255,0.35)"/>
    <rect x="220" y="766" width="100" height="6" rx="3" fill="rgba(0,122,255,0.2)"/>

    <!-- Border -->
    <path d="M512,24 C649,24 694,24 744,38 C780,48 811,65 838,92 C865,119 882,150 892,186 C906,236 906,281 906,418 L906,606 C906,743 906,788 892,838 C882,874 865,905 838,932 C811,959 780,976 744,986 C694,1000 649,1000 512,1000 C375,1000 330,1000 280,986 C244,976 213,959 186,932 C159,905 142,874 132,838 C118,788 118,743 118,606 L118,418 C118,281 118,236 132,186 C142,150 159,119 186,92 C213,65 244,48 280,38 C330,24 375,24 512,24 Z" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  </g>
</svg>
